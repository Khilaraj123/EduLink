<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student | Classroom</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/student.css" />
    <link rel="stylesheet" href="css/classroom.css">
  </head>
  <body>
    <!-- Toast Container -->
    <div class="toast-container"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">📚 EduLink</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="dashboard.html"
                ><i class="fas fa-home"></i> Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="courses.html"
                ><i class="fas fa-book"></i> Courses</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="my-courses.html"
                ><i class="fas fa-graduation-cap"></i> My Courses</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="classroom.html"
                ><i class="fas fa-chalkboard"></i> Classroom</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="community.html"
                ><i class="fas fa-comments"></i> Community</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html"
                ><i class="fas fa-user"></i> Profile</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" id="logoutBtn"
                ><i class="fas fa-sign-out-alt"></i> Logout</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 d-md-block bg-light sidebar">
          <div class="position-sticky pt-3">
            <ul class="nav flex-column">
              <li class="nav-item">
                <a class="nav-link" href="dashboard.html">
                  <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="my-courses.html">
                  <i class="fas fa-book-open"></i> My Learning
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="classroom.html">
                  <i class="fas fa-chalkboard"></i> My Classrooms
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="assignments.html">
                  <i class="fas fa-tasks"></i> Assignments
                </a>
              </li>
            </ul>

            <!-- Upcoming Deadlines -->
            <div class="mt-4 p-3">
              <div class="alert alert-danger">
                <i class="fas fa-clock"></i>
                <strong>Upcoming Deadlines</strong>
                <hr />
                <div id="upcomingDeadlines">
                  <small>Loading...</small>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 ms-sm-auto px-md-4">
          <div
            class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom"
          >
            <h1 class="h2"><i class="fas fa-chalkboard"></i> My Classrooms</h1>
            <div id="userWelcome" class="text-muted"></div>
          </div>

          <!-- Classroom Grid -->
          <div id="classroomsContainer"></div>
        </div>
      </div>
    </div>

    <!-- Classroom Detail Modal -->
    <div
      class="modal fade"
      id="classroomModal"
      tabindex="-1"
      data-bs-backdrop="static"
    >
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="classroomModalTitle"></h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <ul class="nav nav-tabs" id="classroomTabs" role="tablist">
              <li class="nav-item">
                <button
                  class="nav-link active"
                  id="announcements-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#announcements"
                  type="button"
                  role="tab"
                >
                  <i class="fas fa-bullhorn"></i> Announcements
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link"
                  id="assignments-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#assignments"
                  type="button"
                  role="tab"
                >
                  <i class="fas fa-tasks"></i> Assignments
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link"
                  id="resources-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#resources"
                  type="button"
                  role="tab"
                >
                  <i class="fas fa-folder-open"></i> Resources
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link"
                  id="discussions-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#discussions"
                  type="button"
                  role="tab"
                >
                  <i class="fas fa-comments"></i> Discussions
                </button>
              </li>
            </ul>
            <div class="tab-content mt-3" id="classroomTabContent">
              <div
                class="tab-pane fade show active"
                id="announcements"
                role="tabpanel"
              >
                <div id="announcementsContent"></div>
              </div>
              <div class="tab-pane fade" id="assignments" role="tabpanel">
                <div id="assignmentsContent"></div>
              </div>
              <div class="tab-pane fade" id="resources" role="tabpanel">
                <div id="resourcesContent"></div>
              </div>
              <div class="tab-pane fade" id="discussions" role="tabpanel">
                <div id="discussionsContent"></div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Submit Assignment Modal -->
    <div class="modal fade" id="submitAssignmentModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Submit Assignment</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="assignmentForm">
              <div class="mb-3">
                <label class="form-label">Assignment Title</label>
                <input
                  type="text"
                  class="form-control"
                  id="assignmentTitle"
                  readonly
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Your Work</label>
                <textarea
                  class="form-control"
                  id="assignmentWork"
                  rows="5"
                  placeholder="Describe your work or paste links..."
                ></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label">Attach File Link (Optional)</label>
                <input
                  type="text"
                  class="form-control"
                  id="attachmentLink"
                  placeholder="https://..."
                />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="submitAssignment()"
            >
              Submit Assignment
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Add Discussion Modal -->
    <div class="modal fade" id="discussionModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Start a Discussion</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="discussionForm">
              <div class="mb-3">
                <label class="form-label">Topic</label>
                <input
                  type="text"
                  class="form-control"
                  id="discussionTopic"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea
                  class="form-control"
                  id="discussionMessage"
                  rows="4"
                  required
                ></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="addDiscussion()"
            >
              Post Discussion
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/classroom.js"></script>
  </body>
</html>
