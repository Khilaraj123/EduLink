<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="../../css/main.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">📚 EduLink</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="dashboard.html"
                ><i class="fas fa-home"></i> Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="courses.html"
                ><i class="fas fa-book"></i> Courses</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="my-courses.html"
                ><i class="fas fa-graduation-cap"></i> My Courses</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="community.html"
                ><i class="fas fa-comments"></i> Community</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html"
                ><i class="fas fa-user"></i> Profile</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" id="logoutBtn"
                ><i class="fas fa-sign-out-alt"></i> Logout</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 d-md-block bg-light sidebar">
          <div class="position-sticky pt-3">
            <ul class="nav flex-column">
              <li class="nav-item">
                <a class="nav-link active" href="dashboard.html"
                  ><i class="fas fa-tachometer-alt"></i> Dashboard</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="my-courses.html"
                  ><i class="fas fa-book-open"></i> My Learning</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="classroom.html"
                  ><i class="fas fa-chalkboard"></i> My Classrooms</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="assignments.html"
                  ><i class="fas fa-tasks"></i> Assignments</a
                >
              </li>
            </ul>
          </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 ms-sm-auto px-md-4">
          <div
            class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom"
          >
            <h1 class="h2">Student Dashboard</h1>
            <div id="userWelcome"></div>
          </div>

          <!-- Statistics Cards -->
          <div class="row">
            <div class="col-md-4 mb-3">
              <div class="card text-white bg-info">
                <div class="card-body">
                  <h5 class="card-title">Enrolled Courses</h5>
                  <h2 id="enrolledCount">0</h2>
                </div>
              </div>
            </div>
            <div class="col-md-4 mb-3">
              <div class="card text-white bg-success">
                <div class="card-body">
                  <h5 class="card-title">Completed</h5>
                  <h2 id="completedCount">0</h2>
                </div>
              </div>
            </div>
            <div class="col-md-4 mb-3">
              <div class="card text-white bg-warning">
                <div class="card-body">
                  <h5 class="card-title">Pending Assignments</h5>
                  <h2 id="pendingCount">0</h2>
                </div>
              </div>
            </div>
          </div>

          <!-- My Courses Section -->
          <div class="mt-4">
            <h3>My Active Courses</h3>
            <div id="myCoursesList" class="row"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/main.js"></script>
    <script src="../../js/data-service.js"></script>
  </body>
</html>
